name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject EmailJS Secrets
        run: |
          sed -i 's/___EMAILJS_SERVICE_ID___/${{ secrets.EMAILJS_SERVICE_ID }}/g' app.js
          sed -i 's/___EMAILJS_TEMPLATE_ADMIN_ID___/${{ secrets.EMAILJS_TEMPLATE_ADMIN_ID }}/g' app.js
          sed -i 's/___EMAILJS_TEMPLATE_AUTO_ID___/${{ secrets.EMAILJS_TEMPLATE_AUTO_ID }}/g' app.js
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
